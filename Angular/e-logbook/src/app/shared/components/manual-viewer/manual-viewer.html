<div class="viewer-container">
    <div class="header">
        <h2 mat-dialog-title>Manuel Logbook MSF</h2>
        <div class="controls">
            <button mat-icon-button (click)="zoomOut()" matTooltip="Zoom Arrière">
                <mat-icon>remove</mat-icon>
            </button>
            <span class="zoom-level">{{ (zoom * 100) | number:'1.0-0' }}%</span>
            <button mat-icon-button (click)="zoomIn()" matTooltip="Zoom Avant">
                <mat-icon>add</mat-icon>
            </button>
            <button mat-icon-button (click)="rotate()" matTooltip="Pivoter">
                <mat-icon>rotate_right</mat-icon>
            </button>
            <button mat-icon-button (click)="close()" matTooltip="Fermer">
                <mat-icon>close</mat-icon>
            </button>
        </div>
    </div>

    <mat-dialog-content class="content">
        <div *ngIf="isLoading" class="loading-bar">
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </div>

        <div *ngIf="error" class="error-message">
            <mat-icon>error</mat-icon>
            <p>Impossible de charger le manuel.</p>
            <p class="details">Vérifiez que le fichier assets/manual.pdf existe.</p>
        </div>

        <div class="pdf-wrapper">
            <pdf-viewer [src]="pdfSrc" [render-text]="renderText" [rotation]="rotation" [original-size]="originalSize"
                [show-all]="showAll" [fit-to-page]="true" [zoom]="zoom" [zoom-scale]="'page-width'" [(page)]="page"
                (after-load-complete)="onLoadComplete($event)" (error)="onError($event)"
                (on-progress)="onProgress($event)" style="display: block; width: 100%; height: 100%;">
            </pdf-viewer>
        </div>
    </mat-dialog-content>

    <div class="footer">
        <button mat-button (click)="prevPage()" [disabled]="page <= 1">
            <mat-icon>chevron_left</mat-icon> Précédent
        </button>
        <span class="page-info">Page {{ page }}</span>
        <button mat-button (click)="nextPage()">
            Suivant <mat-icon>chevron_right</mat-icon>
        </button>
    </div>
</div>
