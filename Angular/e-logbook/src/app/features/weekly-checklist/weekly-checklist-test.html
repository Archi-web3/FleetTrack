<div style="padding: 20px; background: red; color: white; font-size: 30px;">
    <h1>CHECKLIST TEST - SI VOUS VOYEZ CECI, LE COMPOSANT FONCTIONNE</h1>

    <p>Loading: {{loading}}</p>
    <p>Checklist exists: {{checklist ? 'OUI' : 'NON'}}</p>
    <p>Categories: {{categories?.length || 0}}</p>

    <div style="background: yellow; color: black; padding: 10px; margin: 10px 0;">
        <h2>LISTE DES CATÉGORIES:</h2>
        <ul>
            <li *ngFor="let cat of categories">{{cat}}</li>
        </ul>
    </div>

    <div style="background: green; color: white; padding: 10px;">
        <h2>SI VOUS NE VOYEZ PAS CECI, IL Y A UN PROBLÈME DE RENDU ANGULAR</h2>
    </div>
</div>
