<div class="trips-container">
    <!-- Header -->
    <div class="trips-header">
        <h1>
            <mat-icon>directions_car</mat-icon>
            Trajets
        </h1>
        <div class="header-actions">
            <button mat-raised-button color="primary" (click)="startNewTrip()">
                <mat-icon>add</mat-icon>
                Nouveau trajet
            </button>
            <button mat-icon-button (click)="router.navigate(['/dashboard'])" matTooltip="Retour au tableau de bord">
                <mat-icon>dashboard</mat-icon>
            </button>
            <button mat-icon-button [disabled]="isSyncing" (click)="syncData()" matTooltip="Synchroniser">
                <mat-icon [class.spinning]="isSyncing">sync</mat-icon>
            </button>
        </div>
    </div>

    <!-- Trips Table -->
    <div class="table-container">
        <table mat-table [dataSource]="trips" class="trips-table">

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let trip">
                    <button mat-icon-button color="primary" [matTooltip]="'ID: ' + trip._id + ' (Voir détails)'"
                        (click)="openDetails(trip)">
                        <mat-icon>visibility</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteTrip(trip, $event)" matTooltip="Supprimer"
                        *ngIf="isAdmin">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <!-- Table Rows -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="trip-row"></tr>

            <!-- No Data Row -->
            <tr class="mat-row no-data-row" *matNoDataRow>
                <td class="mat-cell" [attr.colspan]="displayedColumns.length">
                    <div class="no-data">
                        <mat-icon>inbox</mat-icon>
                        <p>Aucun trajet trouvé</p>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <!-- Quick Stats -->
    <div class="quick-stats">
        <mat-card class="stat-card">
            <mat-icon>local_gas_station</mat-icon>
            <div class="stat-info">
                <h3>{{ fuels.length }}</h3>
                <p>Ravitaillements</p>
            </div>
        </mat-card>
        <mat-card class="stat-card">
            <mat-icon>build</mat-icon>
            <div class="stat-info">
                <h3>{{ maintenances.length }}</h3>
                <p>Maintenances</p>
            </div>
        </mat-card>
        <mat-card class="stat-card">
            <mat-icon>warning</mat-icon>
            <div class="stat-info">
                <h3>{{ incidents.length }}</h3>
                <p>Incidents</p>
            </div>
        </mat-card>
    </div>
</div>
