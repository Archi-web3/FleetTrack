<div class="container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Maintenance</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="maintenanceForm" (ngSubmit)="saveMaintenance()">
                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>Type de Maintenance</mat-label>
                    <mat-select formControlName="maintenanceType">
                        <mat-option value="Révision">Révision</mat-option>
                        <mat-option value="Vidange">Vidange</mat-option>
                        <mat-option value="Pneus">Pneus</mat-option>
                        <mat-option value="Freins">Freins</mat-option>
                        <mat-option value="Batterie">Batterie</mat-option>
                        <mat-option value="Réparation">Réparation</mat-option>
                        <mat-option value="Autre">Autre</mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>Kilométrage</mat-label>
                    <input matInput type="number" formControlName="mileage">
                    <mat-hint *ngIf="lastMileage > 0">Dernier kilométrage: {{ lastMileage }} km</mat-hint>
                    <mat-error *ngIf="maintenanceForm.get('mileage')?.invalid">
                        {{ getMileageError() }}
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>Garage (optionnel)</mat-label>
                    <input matInput formControlName="garage">
                </mat-form-field>

                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>Coût (optionnel)</mat-label>
                    <input matInput type="number" formControlName="cost" step="0.01">
                    <mat-error *ngIf="maintenanceForm.get('cost')?.hasError('min')">
                        Le coût doit être positif
                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" class="full-width action-btn" type="submit"
                    [disabled]="maintenanceForm.invalid || maintenanceForm.pending">
                    <span *ngIf="!maintenanceForm.pending">ENREGISTRER</span>
                    <span *ngIf="maintenanceForm.pending">Validation...</span>
                </button>

                <button mat-button class="full-width" type="button" (click)="cancel()">
                    ANNULER
                </button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
