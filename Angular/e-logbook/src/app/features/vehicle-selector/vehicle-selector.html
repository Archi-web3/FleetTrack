<div class="selector-container">
    <mat-card class="selector-card">
        <mat-card-header>
            <mat-card-title>{{ 'VEHICLE_SELECTOR.TITLE' | translate }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>

            <div *ngIf="isLoading" class="loading">
                {{ 'VEHICLE_SELECTOR.LOADING' | translate }}
            </div>

            <div *ngIf="!isLoading">
                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>{{ 'VEHICLE_SELECTOR.LABEL' | translate }}</mat-label>
                    <mat-select [(ngModel)]="selectedVehicleId">
                        <mat-option *ngFor="let vehicle of vehicules" [value]="vehicle._id" class="vehicle-option">
                            <div class="vehicle-item">
                                <span *ngIf="vehicle.acfCode">{{ vehicle.acfCode }} - {{ vehicle.marque }} {{
                                    vehicle.modele }}</span>
                                <span *ngIf="!vehicle.acfCode">{{ vehicle.marque }} {{ vehicle.modele }} ({{
                                    vehicle.immatriculation }})</span>
                                <button mat-icon-button color="warn" *ngIf="isAdmin"
                                    (click)="deleteVehicle($event, vehicle._id)">
                                    <mat-icon>delete</mat-icon>
                                </button>
                            </div>
                        </mat-option>
                    </mat-select>
                </mat-form-field>

                <button mat-raised-button color="primary" class="full-width select-btn" (click)="selectVehicle()"
                    [disabled]="!selectedVehicleId">
                    {{ 'VEHICLE_SELECTOR.CONTINUE' | translate }}
                </button>
            </div>

        </mat-card-content>
    </mat-card>
</div>
