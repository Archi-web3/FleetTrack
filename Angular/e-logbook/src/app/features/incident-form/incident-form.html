<div class="container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Signaler un Incident</mat-card-title>
        </mat-card-header>
        <mat-card-content>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Type d'Incident</mat-label>
                <mat-select [(ngModel)]="incidentType">
                    <mat-option value="Panne">Panne</mat-option>
                    <mat-option value="Accident">Accident</mat-option>
                    <mat-option value="Retard">Retard</mat-option>
                    <mat-option value="Crevaison">Crevaison</mat-option>
                    <mat-option value="Autre">Autre</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Gravité</mat-label>
                <mat-select [(ngModel)]="severity">
                    <mat-option value="Faible">Faible</mat-option>
                    <mat-option value="Moyenne">Moyenne</mat-option>
                    <mat-option value="Élevée">Élevée</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput [(ngModel)]="description" rows="4" required></textarea>
            </mat-form-field>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Coût (optionnel)</mat-label>
                <input matInput type="number" [(ngModel)]="cost" step="0.01">
            </mat-form-field>

            <!-- NOUVEAU: Section Photos -->
            <div class="photos-section">
                <h3>Photos</h3>

                <!-- Bouton Prendre Photo -->
                <button mat-raised-button color="primary" type="button" (click)="takePhoto()" class="photo-btn">
                    <mat-icon>photo_camera</mat-icon>
                    Prendre une photo
                </button>

                <!-- Input caché pour sélection fichier -->
                <input #fileInput type="file" accept="image/*" capture="environment" (change)="onPhotoSelected($event)"
                    style="display: none">

                <!-- Miniatures des photos -->
                <div class="photo-grid" *ngIf="photos.length > 0">
                    <div *ngFor="let photo of photos; let i = index" class="photo-item">
                        <img [src]="photo.url || photo.localUrl" [alt]="'Photo ' + (i+1)">
                        <button mat-icon-button class="delete-btn" (click)="removePhoto(i)" type="button">
                            <mat-icon>delete</mat-icon>
                        </button>
                        <mat-icon *ngIf="!photo.synced" class="sync-icon" matTooltip="En attente de synchronisation">
                            cloud_upload
                        </mat-icon>
                        <mat-icon *ngIf="photo.synced" class="synced-icon" matTooltip="Synchronisé">
                            cloud_done
                        </mat-icon>
                    </div>
                </div>

                <!-- NOUVEAU: Message d'upload en cours -->
                <div class="upload-status" *ngIf="getPendingUploadsCount() > 0">
                    <mat-icon class="upload-icon">cloud_upload</mat-icon>
                    <span>Upload en cours... ({{ getPendingUploadsCount() }} photo(s))</span>
                </div>
            </div>

            <button mat-raised-button color="warn" class="full-width action-btn" (click)="saveIncident()"
                [disabled]="!incidentType || !description">
                SIGNALER
            </button>

            <button mat-button class="full-width" (click)="cancel()">
                ANNULER
            </button>

        </mat-card-content>
    </mat-card>
</div>
