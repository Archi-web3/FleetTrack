<div class="fuels-container">
    <!-- Header -->
    <div class="fuels-header">
        <h1>
            <mat-icon>local_gas_station</mat-icon>
            Ravitaillements
        </h1>
        <div class="header-actions">
            <button mat-raised-button color="primary" (click)="addFuel()">
                <mat-icon>add</mat-icon>
                Nouveau
            </button>
            <button mat-icon-button (click)="router.navigate(['/dashboard'])" matTooltip="Retour au tableau de bord">
                <mat-icon>dashboard</mat-icon>
            </button>
            <button mat-icon-button [disabled]="isSyncing" (click)="syncData()" matTooltip="Synchroniser">
                <mat-icon [class.spinning]="isSyncing">sync</mat-icon>
            </button>
        </div>
    </div>

    <!-- Fuels Table -->
    <div class="table-container">
        <table mat-table [dataSource]="fuels" class="fuels-table">

            <!-- Sync Status Column -->
            <ng-container matColumnDef="syncStatus">
                <th mat-header-cell *matHeaderCellDef>Sync</th>
                <td mat-cell *matCellDef="let fuel">
                    <mat-icon [color]="fuel.synced ? 'primary' : 'warn'"
                        [matTooltip]="fuel.synced ? 'Synchronisé' : 'En attente de synchronisation'">
                        {{ fuel.synced ? 'check_circle' : 'sync' }}
                    </mat-icon>
                </td>
            </ng-container>

            <!-- Date Column -->
            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef>Date</th>
                <td mat-cell *matCellDef="let fuel">
                    {{ fuel.date | date:'dd/MM/yyyy' }}
                </td>
            </ng-container>

            <!-- Quantity Column -->
            <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef>Quantité</th>
                <td mat-cell *matCellDef="let fuel">
                    {{ fuel.quantity }} L
                </td>
            </ng-container>

            <!-- Type Column -->
            <ng-container matColumnDef="type">
                <th mat-header-cell *matHeaderCellDef>Type</th>
                <td mat-cell *matCellDef="let fuel">
                    {{ fuel.type }}
                </td>
            </ng-container>

            <!-- Mileage Column -->
            <ng-container matColumnDef="mileage">
                <th mat-header-cell *matHeaderCellDef>Kilométrage</th>
                <td mat-cell *matCellDef="let fuel">
                    {{ fuel.mileage }} km
                </td>
            </ng-container>

            <!-- Source Column -->
            <ng-container matColumnDef="source">
                <th mat-header-cell *matHeaderCellDef>Source</th>
                <td mat-cell *matCellDef="let fuel">
                    {{ fuel.source }}
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let fuel">
                    <button mat-icon-button color="primary" matTooltip="Voir détails" (click)="openDetails(fuel)">
                        <mat-icon>visibility</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteFuel(fuel, $event)" matTooltip="Supprimer"
                        *ngIf="isAdmin">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <!-- Table Rows -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="fuel-row"></tr>

            <!-- No Data Row -->
            <tr class="mat-row no-data-row" *matNoDataRow>
                <td class="mat-cell" [attr.colspan]="displayedColumns.length">
                    <div class="no-data">
                        <mat-icon>inbox</mat-icon>
                        <p>Aucun ravitaillement trouvé</p>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</div>
