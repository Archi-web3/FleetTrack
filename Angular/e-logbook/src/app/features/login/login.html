<!-- NOUVEAU: Bandeau supérieur comme gestion-des-deplacements -->
<mat-toolbar color="primary" class="login-toolbar">
    <img src="/acf-logo.png" alt="Logo ACF" class="toolbar-logo">
    <span class="toolbar-spacer"></span>
</mat-toolbar>

<div class="login-container">
    <mat-card class="login-card">
        <!-- Logo et titre À L'INTÉRIEUR de la carte -->
        <div class="login-branding">
            <img src="/assets/logo_acf.png" alt="ACF Logo" class="acf-logo">
            <h1 class="app-title">e-Logbook <span style="font-size: 0.6em; color: #005FB6;">(v2.3)</span></h1>
        </div>

        <mat-card-header>
            <mat-card-title>Connexion</mat-card-title>
            <mat-card-subtitle>Chauffeur</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="email" required>
            </mat-form-field>

            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Mot de passe</mat-label>
                <input matInput type="password" [(ngModel)]="password" required (keyup.enter)="login()">
            </mat-form-field>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button mat-raised-button color="primary" class="full-width login-btn" (click)="login()"
                [disabled]="isLoading || !email || !password">
                {{ isLoading ? 'Connexion...' : 'SE CONNECTER' }}
            </button>

        </mat-card-content>
    </mat-card>
</div>
