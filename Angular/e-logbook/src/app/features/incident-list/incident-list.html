<div class="incident-container">
    <!-- Header -->
    <div class="incident-header">
        <h1>
            <mat-icon>warning</mat-icon>
            Incidents
        </h1>
        <div class="header-actions">
            <button mat-raised-button color="primary" (click)="addIncident()">
                <mat-icon>add</mat-icon>
                Nouveau
            </button>
            <button mat-icon-button (click)="router.navigate(['/dashboard'])" matTooltip="Retour au tableau de bord">
                <mat-icon>dashboard</mat-icon>
            </button>
            <button mat-icon-button [disabled]="isSyncing" (click)="syncData()" matTooltip="Synchroniser">
                <mat-icon [class.spinning]="isSyncing">sync</mat-icon>
            </button>
        </div>
    </div>

    <!-- Incident Table -->
    <div class="table-container">
        <table mat-table [dataSource]="incidents" class="incident-table">

            <!-- Sync Status Column -->
            <ng-container matColumnDef="syncStatus">
                <th mat-header-cell *matHeaderCellDef>Sync</th>
                <td mat-cell *matCellDef="let incident">
                    <mat-icon [color]="incident.synced ? 'primary' : 'warn'"
                        [matTooltip]="incident.synced ? 'Synchronisé' : 'En attente de synchronisation'">
                        {{ incident.synced ? 'check_circle' : 'sync' }}
                    </mat-icon>
                </td>
            </ng-container>

            <!-- Date Column -->
            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef>Date</th>
                <td mat-cell *matCellDef="let incident">
                    {{ incident.date | date:'dd/MM/yyyy' }}
                </td>
            </ng-container>

            <!-- Type Column -->
            <ng-container matColumnDef="type">
                <th mat-header-cell *matHeaderCellDef>Type</th>
                <td mat-cell *matCellDef="let incident">
                    {{ incident.type }}
                </td>
            </ng-container>

            <!-- Severity Column -->
            <ng-container matColumnDef="severity">
                <th mat-header-cell *matHeaderCellDef>Gravité</th>
                <td mat-cell *matCellDef="let incident">
                    <span class="severity-badge" [class.severity-high]="incident.severity === 'High'"
                        [class.severity-medium]="incident.severity === 'Medium'"
                        [class.severity-low]="incident.severity === 'Low'">
                        {{ incident.severity }}
                    </span>
                </td>
            </ng-container>

            <!-- Description Column -->
            <ng-container matColumnDef="description">
                <th mat-header-cell *matHeaderCellDef>Description</th>
                <td mat-cell *matCellDef="let incident">
                    {{ incident.description }}
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let incident">
                    <button mat-icon-button color="primary" matTooltip="Voir détails" (click)="openDetails(incident)">
                        <mat-icon>visibility</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteIncident(incident, $event)"
                        matTooltip="Supprimer" *ngIf="isAdmin">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <!-- Table Rows -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="incident-row"></tr>

            <!-- No Data Row -->
            <tr class="mat-row no-data-row" *matNoDataRow>
                <td class="mat-cell" [attr.colspan]="displayedColumns.length">
                    <div class="no-data">
                        <mat-icon>inbox</mat-icon>
                        <p>Aucun incident trouvé</p>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</div>
