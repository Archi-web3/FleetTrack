<div class="change-pwd-container">
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <div class="pwd-grid">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" formControlName="currentPassword" placeholder="Enter Current Password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="newPassword" placeholder="Enter New Password">
      </div>
      <div class="form-group">
        <label>New Confirm Password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Enter Confirm Password">
      </div>
    </div>
    
    <div class="action-row">
      <button type="submit" class="btn-save" [disabled]="!passwordForm.valid">Save Changes</button>
    </div>
  </form>
</div>
