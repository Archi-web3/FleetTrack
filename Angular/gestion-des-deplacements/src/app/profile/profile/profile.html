<div style="padding: 24px; max-width: 1000px; margin: 0 auto;">
  <h2 style="margin-bottom: 24px; color: #333; font-weight: 500;">Profil Utilisateur</h2>

  <div style="display: flex; gap: 24px;">
    <!-- Menu Latéral -->
    <div style="width: 250px; flex-shrink: 0;">
      <mat-card>
        <div class="nav-menu">
          <button class="nav-item" [class.active]="activeTab === 'personal'" (click)="setTab('personal')">
            <mat-icon>person</mat-icon>
            Informations Personnelles
          </button>
          
          <button class="nav-item" [class.active]="activeTab === 'password'" (click)="setTab('password')">
            <mat-icon>lock</mat-icon>
            Mot de passe
          </button>
        </div>
      </mat-card>
    </div>

    <!-- Contenu -->
    <div style="flex: 1;">
      <mat-card style="padding: 24px;">
        <app-personal-info *ngIf="activeTab === 'personal'"></app-personal-info>
        <app-change-password *ngIf="activeTab === 'password'"></app-change-password>
      </mat-card>
    </div>
  </div>
</div>
