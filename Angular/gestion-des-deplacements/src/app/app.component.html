<ng-container *ngIf="isAuthenticated">
  <!-- TOP BAR (Dark) -->
  <div class="top-bar">
    <div class="logo-container" routerLink="/" style="cursor: pointer;">
      <img [src]="brandSettings?.logoLight || 'assets/logo_acf.png'" alt="Logo" style="max-height: 40px; width: auto; object-fit: contain;">
      <h1>{{ brandSettings?.appName || 'FleetTrack' }}</h1>
    </div>

    <!-- Country Selector -->
    <div style="margin-left: 32px;">
      <app-country-selector></app-country-selector>
    </div>

    <span class="toolbar-spacer"></span>

    <div class="top-bar-actions">
      <app-language-selector></app-language-selector>

      <div class="user-info">
        <mat-icon>account_circle</mat-icon>
        <div style="display: flex; flex-direction: column;">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">{{ userProfile }}</span>
        </div>
      </div>

      <button mat-icon-button routerLink="/profile" matTooltip="Mon Profil">
        <mat-icon>settings</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="logout()" matTooltip="{{ 'COMMON.LOGOUT' | translate }}">
        <mat-icon>power_settings_new</mat-icon>
      </button>
    </div>
  </div>

  <!-- SECONDARY BAR (Light / Tabs) -->
  <div class="sec-bar">
    <div class="sec-bar-nav">
      <!-- DASHBOARD -->
      <button class="nav-item" [matMenuTriggerFor]="dashboardMenu">
        <mat-icon>home</mat-icon> {{ 'MENU.GROUPS.DASHBOARD' | translate }} <mat-icon>expand_more</mat-icon>
      </button>
      <mat-menu #dashboardMenu="matMenu">
        <button mat-menu-item routerLink="/planning"><mat-icon>calendar_today</mat-icon><span>{{ 'MENU.GLOBAL_PLANNING' | translate }}</span></button>
        <button mat-menu-item routerLink="/tableau-bord" *ngIf="userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'SuperAdmin'"><mat-icon>analytics</mat-icon><span>{{ 'MENU.DASHBOARD.TITLE' | translate }}</span></button>
        <button mat-menu-item routerLink="/logbook"><mat-icon>menu_book</mat-icon><span>{{ 'MENU.LOGBOOK' | translate }}</span></button>
        <button mat-menu-item routerLink="/map"><mat-icon>map</mat-icon><span>{{ 'MENU.INTERACTIVE_MAP' | translate }}</span></button>
      </mat-menu>

      <!-- MY SPACE -->
      <button class="nav-item" [matMenuTriggerFor]="mySpaceMenu">
        <mat-icon>person</mat-icon> {{ 'MENU.GROUPS.MY_SPACE' | translate }} <mat-icon>expand_more</mat-icon>
      </button>
      <mat-menu #mySpaceMenu="matMenu">
        <button mat-menu-item (click)="openNouvelleDemandeModal()"><mat-icon>add_circle_outline</mat-icon><span>{{ 'MENU.NEW_REQUEST' | translate }}</span></button>
        <button mat-menu-item routerLink="/mes-mouvements"><mat-icon>history</mat-icon><span>{{ 'MENU.MY_TRIPS' | translate }}</span></button>
      </mat-menu>

      <!-- OPERATIONS -->
      <ng-container *ngIf="perms.canViewMenu('mouvements_workflow') || perms.canViewMenu('mouvements_consolidation')">
        <button class="nav-item" [matMenuTriggerFor]="opsMenu">
          <mat-icon>flash_on</mat-icon> {{ 'MENU.GROUPS.OPERATIONS' | translate }} <mat-icon>expand_more</mat-icon>
        </button>
        <mat-menu #opsMenu="matMenu">
          <button mat-menu-item routerLink="/valider-mouvements"><mat-icon>check_circle</mat-icon><span>{{ 'MENU.VALIDATE_TRIPS' | translate }}</span></button>
          <button mat-menu-item routerLink="/consolidation"><mat-icon>merge_type</mat-icon><span>{{ 'MENU.CONSOLIDATION' | translate }}</span></button>
        </mat-menu>
      </ng-container>

      <!-- VEHICLES -->
      <ng-container *ngIf="perms.canViewMenu('flotte_vehicules') || perms.canViewMenu('flotte_chauffeurs') || perms.canViewMenu('flotte_maintenance')">
        <button class="nav-item" [matMenuTriggerFor]="vehiclesMenu">
          <mat-icon>local_shipping</mat-icon> Flotte & Maintenance <mat-icon>expand_more</mat-icon>
        </button>
        <mat-menu #vehiclesMenu="matMenu">
          <button mat-menu-item routerLink="/gestion-vehicules"><mat-icon>directions_car</mat-icon><span>{{ 'MENU.VEHICLE_MANAGEMENT' | translate }}</span></button>
          <button mat-menu-item routerLink="/gestion-chauffeurs"><mat-icon>people_alt</mat-icon><span>{{ 'MENU.DRIVER_MANAGEMENT' | translate }}</span></button>
          <mat-divider></mat-divider>
          <button mat-menu-item routerLink="/gestion-maintenance" *ngIf="perms.canViewMenu('flotte_maintenance')"><mat-icon>build</mat-icon><span>{{ 'MENU.MAINTENANCE_TRACKING' | translate }}</span></button>
          <button mat-menu-item routerLink="/recap-flotte" *ngIf="perms.canViewMenu('flotte_vehicules')"><mat-icon>assessment</mat-icon><span>{{ 'MENU.FLEET_RECAP' | translate }}</span></button>
          <button mat-menu-item routerLink="/rapports-mensuels" *ngIf="perms.canViewMenu('flotte_vehicules')"><mat-icon>bar_chart</mat-icon><span>{{ 'MENU.MONTHLY_REPORTS' | translate }}</span></button>
        </mat-menu>
      </ng-container>

      <!-- SECURITY -->
      <ng-container *ngIf="userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'Superviseur Sécurité' || userProfile === 'SuperAdmin'">
        <button class="nav-item" [matMenuTriggerFor]="securityMenu">
          <mat-icon>security</mat-icon> Sécurité <mat-icon>expand_more</mat-icon>
        </button>
        <mat-menu #securityMenu="matMenu">
          <button mat-menu-item routerLink="/security-alerts"><mat-icon style="color: #f44336;">notification_important</mat-icon><span>{{ 'MENU.SECURITY_ALERTS' | translate }}</span></button>
          <button mat-menu-item routerLink="/admin/waivers"><mat-icon>folder_shared</mat-icon><span>{{ 'MENU.WAIVERS' | translate }}</span></button>
          <button mat-menu-item routerLink="/admin/security-matrix" *ngIf="perms.hasPermission('security_matrix', 'manage') || userProfile === 'SuperAdmin'"><mat-icon style="color: #4caf50;">shield</mat-icon><span>{{ 'MENU.SECURITY_MATRIX' | translate }}</span></button>
        </mat-menu>
      </ng-container>

      <!-- PARAMETRAGE FLEET -->
      <ng-container *ngIf="perms.canViewMenu('admin_geo') || perms.canViewMenu('admin_users')">
        <button class="nav-item" [matMenuTriggerFor]="paramFleetMenu">
          <mat-icon>tune</mat-icon> Paramétrages Fleet <mat-icon>expand_more</mat-icon>
        </button>
        <mat-menu #paramFleetMenu="matMenu">
          <button mat-menu-item routerLink="/gestion-utilisateurs" *ngIf="perms.canViewMenu('admin_users')"><mat-icon>people</mat-icon><span>{{ 'MENU.USER_MANAGEMENT' | translate }}</span></button>
          <button mat-menu-item routerLink="/gestion-projets" *ngIf="perms.canViewMenu('admin_settings')"><mat-icon>folder</mat-icon><span>{{ 'MENU.PROJECT_MANAGEMENT' | translate }}</span></button>
          <button mat-menu-item routerLink="/gestion-lieux" *ngIf="perms.canViewMenu('admin_geo')"><mat-icon>place</mat-icon><span>{{ 'MENU.LOCATION_MANAGEMENT' | translate }}</span></button>
          <button mat-menu-item routerLink="/admin/pays-bases" *ngIf="perms.canViewMenu('admin_geo')"><mat-icon>public</mat-icon><span>{{ 'MENU.COUNTRIES_BASES' | translate }}</span></button>
          <button mat-menu-item routerLink="/environment-roadmap" *ngIf="perms.canViewMenu('admin_settings')"><mat-icon>eco</mat-icon><span>{{ 'MENU.ENV_OBJECTIVES' | translate }}</span></button>
          <mat-divider></mat-divider>
          <button mat-menu-item [matMenuTriggerFor]="maintSettings" *ngIf="perms.canViewMenu('flotte_maintenance')"><mat-icon>build_circle</mat-icon><span>Gestion des Maintenances</span></button>
        </mat-menu>
        
        <mat-menu #maintSettings="matMenu">
          <button mat-menu-item routerLink="/gestion-maintenance/config"><mat-icon>schedule</mat-icon><span>Configuration Intervalles</span></button>
          <button mat-menu-item routerLink="/gestion-maintenance/templates"><mat-icon>receipt_long</mat-icon><span>Type de service</span></button>
        </mat-menu>
      </ng-container>

      <!-- WORKFLOW (SUPER ADMIN) -->
      <ng-container *ngIf="userProfile === 'SuperAdmin'">
        <button class="nav-item" routerLink="/admin/workflow">
          <mat-icon style="color: #4facfe;">account_tree</mat-icon> Workflow Visualisation
        </button>
      </ng-container>

      <!-- PARAMETRAGES SYSTEME -->
      <ng-container *ngIf="perms.canViewMenu('admin_settings')">
        <button class="nav-item" [matMenuTriggerFor]="sysSettingsMenu">
          <mat-icon>settings_applications</mat-icon> Paramètres Système <mat-icon>expand_more</mat-icon>
        </button>
        <mat-menu #sysSettingsMenu="matMenu">
          <button mat-menu-item routerLink="/admin/settings" [queryParams]="{tab: 'brand'}">
            <mat-icon>settings</mat-icon><span>Configuration Générale</span>
          </button>
          <button mat-menu-item routerLink="/roadmap">
            <mat-icon>rocket_launch</mat-icon><span>Roadmap et sécurité de l'APP</span>
          </button>
          <button mat-menu-item routerLink="/admin/audit-logs">
            <mat-icon>history_edu</mat-icon><span>Journal d'activité</span>
          </button>
          <button mat-menu-item routerLink="/admin/profile-matrix" *ngIf="userProfile === 'SuperAdmin'">
            <mat-icon style="color: #9c27b0;">admin_panel_settings</mat-icon><span>Matrice des Profils (RBAC)</span>
          </button>
        </mat-menu>
      </ng-container>

      <!-- GUIDE UTILISATEUR -->
      <button class="nav-item" routerLink="/guide-utilisateur">
        <mat-icon style="color: #ffeb3b;">lightbulb</mat-icon> Guide Utilisateur
      </button>
    </div>
  </div>
</ng-container>

<!-- MAIN CONTENT -->
<div [ngClass]="{'main-content': isAuthenticated}">
  <router-outlet></router-outlet>
</div>
