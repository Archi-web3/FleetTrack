<mat-toolbar color="primary">
  <div style="display: flex; align-items: center;">
    <img src="assets/logo_bandeau.png" alt="Logo" style="height: 40px; margin-right: 10px;">
    <span *ngIf="isAuthenticated">
      {{ 'COMMON.WELCOME' | translate }}: <span style="font-weight: bold;">{{ userName }}</span> ({{ userProfile }}<span
        *ngIf="userPays"> - {{
        userPays }}</span><span *ngIf="userBase"> / {{ userBase }}</span>)
    </span>
  </div>

  <!-- Country Selector -->
  <app-country-selector *ngIf="isAuthenticated"></app-country-selector>
  <app-language-selector *ngIf="isAuthenticated"></app-language-selector>

  <span class="toolbar-spacer"></span>

  <!-- ============================== -->
  <!-- 1. USER MANAGEMENT             -->
  <!-- ============================== -->
  <ng-container *ngIf="isAuthenticated && (userProfile === 'Admin' || userProfile === 'SuperAdmin')">
    <button mat-button [matMenuTriggerFor]="userMenu">
      <mat-icon>people</mat-icon> User Management <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item routerLink="/gestion-utilisateurs">
        <mat-icon>person</mat-icon>
        <span>Users</span>
      </button>
      <button mat-menu-item routerLink="/gestion-projets">
        <mat-icon>group</mat-icon>
        <span>Groups</span>
      </button>
      <button mat-menu-item routerLink="/gestion-lieux">
        <mat-icon>place</mat-icon>
        <span>Locations</span>
      </button>
    </mat-menu>
  </ng-container>

  <!-- ============================== -->
  <!-- 2. FLEET & TRIP MANAGEMENT     -->
  <!-- ============================== -->
  <ng-container *ngIf="isAuthenticated">
    <button mat-button [matMenuTriggerFor]="fleetTripMenu">
      <mat-icon>directions_car</mat-icon> Fleet & Trip Mgt <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #fleetTripMenu="matMenu">
      <button mat-menu-item routerLink="/trip-management">
        <mat-icon>explore</mat-icon>
        <span>Manage Trip Request</span>
      </button>
      <button mat-menu-item routerLink="/demande-mouvement">
        <mat-icon>add_circle_outline</mat-icon>
        <span>New Request</span>
      </button>
      <button mat-menu-item routerLink="/valider-mouvements" *ngIf="userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'Superviseur Sécurité' || userProfile === 'SuperAdmin'">
        <mat-icon>check_circle</mat-icon>
        <span>Validate Trips</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/gestion-chauffeurs" *ngIf="userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'SuperAdmin'">
        <mat-icon>people_alt</mat-icon>
        <span>Manage Driver</span>
      </button>
      <button mat-menu-item routerLink="/gestion-vehicules" *ngIf="userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'SuperAdmin'">
        <mat-icon>directions_car</mat-icon>
        <span>Manage Vehicle</span>
      </button>
      <button mat-menu-item routerLink="/gestion-maintenance" *ngIf="userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'SuperAdmin'">
        <mat-icon>build</mat-icon>
        <span>Maintenance</span>
      </button>
      <button mat-menu-item routerLink="/logbook">
        <mat-icon>menu_book</mat-icon>
        <span>Log Book</span>
      </button>
    </mat-menu>
  </ng-container>

  <!-- ============================== -->
  <!-- 3. ANALYSIS                    -->
  <!-- ============================== -->
  <ng-container *ngIf="isAuthenticated && (userProfile === 'Admin' || userProfile === 'Superviseur' || userProfile === 'SuperAdmin')">
    <button mat-button [matMenuTriggerFor]="analysisMenu">
      <mat-icon>analytics</mat-icon> Analysis <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #analysisMenu="matMenu">
      <button mat-menu-item routerLink="/tableau-bord">
        <mat-icon>dashboard</mat-icon>
        <span>KPI Dashboard</span>
      </button>
      <button mat-menu-item routerLink="/map">
        <mat-icon>map</mat-icon>
        <span>Interactive Map</span>
      </button>
      <button mat-menu-item routerLink="/recap-flotte">
        <mat-icon>assessment</mat-icon>
        <span>Fleet Recap</span>
      </button>
      <button mat-menu-item routerLink="/rapports-mensuels">
        <mat-icon>bar_chart</mat-icon>
        <span>Monthly Reports</span>
      </button>
    </mat-menu>
  </ng-container>

  <!-- ============================== -->
  <!-- 4. SETTINGS                    -->
  <!-- ============================== -->
  <ng-container *ngIf="isAuthenticated && (userProfile === 'Admin' || userProfile === 'SuperAdmin')">
    <button mat-button [matMenuTriggerFor]="settingsMenu">
      <mat-icon>settings</mat-icon> Settings <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #settingsMenu="matMenu">
      <button mat-menu-item routerLink="/admin/settings">
        <mat-icon>settings_applications</mat-icon>
        <span>General Settings</span>
      </button>
      <button mat-menu-item routerLink="/security-alerts">
        <mat-icon style="color: #f44336;">notification_important</mat-icon>
        <span>Security Alerts</span>
      </button>
      <button mat-menu-item routerLink="/admin/security-matrix">
        <mat-icon style="color: #4caf50;">shield</mat-icon>
        <span>Security Matrix</span>
      </button>
      <button mat-menu-item routerLink="/admin/pays-bases" *ngIf="userProfile === 'SuperAdmin'">
        <mat-icon>public</mat-icon>
        <span>Countries/Bases</span>
      </button>
    </mat-menu>
  </ng-container>

  <span class="toolbar-spacer"></span>

  <!-- Bouton Profile -->
  <button mat-icon-button *ngIf="isAuthenticated" routerLink="/profile" matTooltip="My Profile">
    <mat-icon>account_circle</mat-icon>
  </button>

  <!-- Bouton Déconnexion -->
  <button mat-icon-button color="warn" *ngIf="isAuthenticated" (click)="logout()" matTooltip="Logout">
    <mat-icon>exit_to_app</mat-icon>
  </button>
</mat-toolbar>

<div style="padding: 20px;">
  <router-outlet></router-outlet>
</div>
