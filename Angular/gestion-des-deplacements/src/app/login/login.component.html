<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 64px);">
  <mat-card style="width: 400px; padding: 20px;">
    <!-- NOUVEAU: Logo et titre réorganisés -->
    <div style="text-align: center; margin-bottom: 30px;">
      <img src="assets/logo_acf.png" alt="Logo ACF" style="max-width: 150px; height: auto; margin-bottom: 15px;">
      <h1 style="margin: 0; color: #005FB6; font-size: 28px; font-weight: 600;">Gestion des Déplacements</h1>
    </div>

    <mat-card-title style="text-align: center; margin-bottom: 20px;">Connexion</mat-card-title>
    <mat-card-content>
      <form (ngSubmit)="onLogin()" #loginForm="ngForm">
        <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 15px;">
          <mat-label>Email</mat-label>
          <input matInput type="email" id="email" name="email" [(ngModel)]="credentials.email" required email>
          <mat-error *ngIf="loginForm.controls['email']?.invalid && loginForm.controls['email']?.touched">
            Veuillez entrer une adresse email valide.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 20px;">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" id="motDePasse" name="motDePasse" [(ngModel)]="credentials.motDePasse"
            required>
          <mat-error *ngIf="loginForm.controls['motDePasse']?.invalid && loginForm.controls['motDePasse']?.touched">
            Le mot de passe est requis.
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.form.valid"
          style="width: 100%;">Se connecter</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
