<div style="padding: 20px;">
  <h2>Planning des Mouvements Validés</h2>

  <!-- Contrôles de navigation du calendrier -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div style="display: flex; gap: 10px;">
      <button mat-raised-button style="background-color: #52ae32; color: white; font-weight: 500; padding: 0 20px;"
        (click)="today()">
        Aujourd'hui
      </button>
      <button mat-raised-button style="background-color: #005fb6; color: white; font-weight: 500; padding: 0 20px;"
        (click)="previousWeek()">
        ← Précédent
      </button>
      <button mat-raised-button style="background-color: #005fb6; color: white; font-weight: 500; padding: 0 20px;"
        (click)="nextWeek()">
        Suivant →
      </button>
    </div>
    <h3 style="margin: 0; color: #005fb6;">{{ viewDate | date:'EEEE dd MMMM yyyy' }}</h3>
  </div>
  <br />

  <!-- Calendrier avec template personnalisé pour les tooltips -->
  <mwl-calendar-week-view [viewDate]="viewDate" [events]="events" [locale]="locale" [hourSegments]="1"
    [dayStartHour]="6" [dayEndHour]="22" [weekStartsOn]="1" (eventClicked)="handleEvent('Clicked', $event.event)"
    [refresh]="refresh" [eventTemplate]="eventTemplate">
  </mwl-calendar-week-view>

  <!-- Template personnalisé pour afficher les événements avec tooltip -->
  <ng-template #eventTemplate let-weekEvent="weekEvent" let-tooltipPlacement="tooltipPlacement"
    let-eventClicked="eventClicked">
    <div class="cal-event" [style.backgroundColor]="weekEvent.event.color?.primary"
      [style.border]="weekEvent.event.meta.hasConflict ? '3px solid red' : '1px solid ' + weekEvent.event.color?.primary"
      [style.color]="'white'" [matTooltip]="weekEvent.event.meta.tooltip" [matTooltipClass]="'event-tooltip'"
      matTooltipPosition="above" (click)="eventClicked.emit()">
      <div class="cal-event-title" [style.color]="'white'">
        <mat-icon *ngIf="weekEvent.event.meta.hasConflict"
          style="font-size:16px; height:16px; width:16px; vertical-align: middle; margin-right:4px; color: yellow;">warning</mat-icon>
        {{ weekEvent.event.title }}
      </div>
    </div>
  </ng-template>

  <!-- Légende des couleurs -->
  <div style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px;">
    <h4 style="margin-top: 0;">Légende des statuts :</h4>
    <div style="display: flex; flex-wrap: wrap; gap: 15px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 20px; height: 20px; background: #005fb6; border-radius: 3px;"></div>
        <span>Validé</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 20px; height: 20px; background: #ff9800; border-radius: 3px;"></div>
        <span>Pris en charge</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 20px; height: 20px; background: #9c27b0; border-radius: 3px;"></div>
        <span>En cours</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 20px; height: 20px; background: #52ae32; border-radius: 3px;"></div>
        <span>Terminé</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 20px; height: 20px; background: #9e9e9e; border-radius: 3px;"></div>
        <span>En attente</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 20px; height: 20px; background: #f44336; border-radius: 3px;"></div>
        <span>Annulé/Refusé</span>
      </div>
    </div>
  </div>

  <br />
  <div *ngIf="events.length === 0">Aucun mouvement validé ou en cours pour cette semaine.</div>

  <br />
  <br />
  <!-- NOUVEAU: Tableau de Bord Mouvements -->
  <app-movement-dashboard [movements]="currentWeekMovements" [dateRangeLabel]="dateRangeLabel"></app-movement-dashboard>
</div>
