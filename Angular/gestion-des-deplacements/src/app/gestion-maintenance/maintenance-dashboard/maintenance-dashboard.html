<div class="maintenance-container" style="padding: 20px;">

    <mat-tab-group animationDuration="0ms">
        <!-- TAB 1: SUIVI GLOBAL (Dashboard) -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon" style="margin-right: 8px;">dashboard</mat-icon>
                Suivi Global
            </ng-template>
            <div class="tab-content" style="padding-top: 20px;">
                <app-maintenance-tracking></app-maintenance-tracking>
            </div>
        </mat-tab>

        <!-- TAB 2: CONFIGURATION (Intervalles) -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon" style="margin-right: 8px;">settings</mat-icon>
                Configuration Intervalles
            </ng-template>
            <div class="tab-content" style="padding-top: 20px;">
                <app-service-config></app-service-config>
            </div>
        </mat-tab>

        <!-- TAB 3: TEMPLATES (Checklists & Maintenance) -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon" style="margin-right: 8px;">assignment</mat-icon>
                Templates
            </ng-template>
            <div class="tab-content" style="padding-top: 20px;">
                <app-template-manager></app-template-manager>
            </div>
        </mat-tab>

        <!-- TAB 4: SUIVI HEBDO -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon" style="margin-right: 8px;">playlist_add_check</mat-icon>
                Suivi Hebdo
            </ng-template>
            <div class="tab-content" style="padding-top: 20px;">
                <app-weekly-checklist-tracker></app-weekly-checklist-tracker>
            </div>
        </mat-tab>

    </mat-tab-group>

</div>
