<div class="page-header-actions" style="justify-content: space-between; margin-bottom: 20px;">
  <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
    <mat-icon style="color: var(--primary-color);">public</mat-icon>
    Gestion des Pays
  </h2>
  <div style="display: flex; gap: 15px; align-items: center;">
    <button *ngIf="perms.hasPermission('admin_geo', 'manage_countries')" mat-flat-button color="primary" (click)="openPaysModal()">
      <mat-icon>add</mat-icon> NOUVEAU PAYS
    </button>
  </div>
</div>

<div class="table-container">
  <div class="table-header-container">
    <mat-form-field appearance="outline" style="margin-bottom: -22px; width: 250px;">
      <mat-label>{{ 'COUNTRIES.COLUMNS' | translate }}</mat-label>
      <mat-select multiple [(ngModel)]="displayedColumns">
        <mat-option *ngFor="let col of allColumns" [value]="col.def">{{ col.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="custom-search-input">
      <mat-icon>search</mat-icon>
      <input type="text" (keyup)="applyFilter($event)" placeholder="Rechercher...">
    </div>
  </div>

  <div class="table-responsive">
    <table mat-table [dataSource]="dataSource" matSort style="width: 100%;">
      
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nom </th>
        <td mat-cell *matCellDef="let element"> <strong>{{element.nom}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Code </th>
        <td mat-cell *matCellDef="let element"> {{element.code}} </td>
      </ng-container>

      <ng-container matColumnDef="devise">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Devise </th>
        <td mat-cell *matCellDef="let element"> {{element.devise || 'USD'}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <div class="action-buttons">
            <button *ngIf="perms.hasPermission('admin_geo', 'manage_countries')" mat-icon-button color="primary" (click)="openPaysModal(element)" matTooltip="Modifier">
              <mat-icon>edit</mat-icon>
            </button>
            <button *ngIf="perms.hasPermission('admin_geo', 'manage_countries')" mat-icon-button color="warn" (click)="deletePays(element)" matTooltip="Supprimer">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>

<ng-template #paysFormDialog>
  <div class="custom-modal-layout" style="width: 100%; max-width: 600px;">
    <div class="custom-modal-header">
      <h2>
        <mat-icon>public</mat-icon>
        {{ selectedPays ? 'Modifier le pays' : 'Ajouter un pays' }}
      </h2>
      <button class="custom-modal-close-btn" (click)="closePaysModal()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <div class="custom-modal-body">
      <form (ngSubmit)="savePays()" #paysForm="ngForm" id="paysForm">
        <div class="modern-form-group">
          <label>Nom du pays</label>
          <input class="modern-input" type="text" name="paysNom" [(ngModel)]="newPays.nom" required>
        </div>
        
        <div class="modal-grid-2">
          <div class="modern-form-group">
            <label>Code (ex: RDC, RCA)</label>
            <input class="modern-input" type="text" name="paysCode" [(ngModel)]="newPays.code" required>
          </div>
          <div class="modern-form-group">
            <label>Devise principale</label>
            <input class="modern-input" type="text" name="paysDevise" [(ngModel)]="newPays.devise" required>
          </div>
        </div>
      </form>
    </div>
    
    <div class="custom-modal-footer">
      <button class="custom-modal-btn-cancel" (click)="closePaysModal()">
        <mat-icon>close</mat-icon> Annuler
      </button>
      <button class="custom-modal-btn-submit" type="submit" form="paysForm" [disabled]="!paysForm.form.valid">
        <mat-icon>check</mat-icon> {{ selectedPays ? 'Mettre à jour' : 'Ajouter' }}
      </button>
    </div>
  </div>
</ng-template>
