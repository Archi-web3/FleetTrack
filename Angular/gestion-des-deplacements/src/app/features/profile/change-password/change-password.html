<div class="change-password-container">
  <div class="header-section">
    <div class="title-wrap">
      <h3>{{ 'PROFILE.CHANGE_PASSWORD' | translate }}</h3>
      <p>{{ 'PROFILE.CHANGE_PASSWORD_DESC' | translate }}</p>
    </div>
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="form-layout">
    
    <div *ngIf="successMessage" style="color: green; margin-bottom: 15px;">{{ successMessage }}</div>
    <div *ngIf="errorMessage" style="color: red; margin-bottom: 15px;">{{ errorMessage }}</div>

    <div class="form-group full-width">
      <label>Ancien mot de passe</label>
      <input type="password" formControlName="currentPassword" placeholder="Entrez l'ancien mot de passe">
    </div>

    <div class="form-group half-width">
      <label>Nouveau mot de passe</label>
      <input type="password" formControlName="newPassword" placeholder="Entrez le nouveau mot de passe">
    </div>

    <div class="form-group half-width">
      <label>Confirmer le mot de passe</label>
      <input type="password" formControlName="confirmPassword" placeholder="Confirmez le nouveau mot de passe">
    </div>

    <div class="action-row" style="margin-top: 20px; text-align: right; width: 100%;">
      <button type="submit" class="btn-save" [disabled]="!passwordForm.valid || isLoading">
        {{ isLoading ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>
  </form>
</div>
