<div class="tree-container">
    <div class="tree-legend">
        <div class="legend-item">
            <span class="legend-dot implemented"></span> Déjà inclus dans FleetTrack
        </div>
        <div class="legend-item">
            <span class="legend-dot planned"></span> Planifié / A faire
        </div>
        <div class="legend-actions">
            <small>Hover sur un élément pour éditer (+/-)</small>
        </div>
    </div>

    <div class="mindmap">
        <!-- ROOT -->
        <div class="node-level-0">
            <div class="node root-node">
                {{ treeData.name }}
                <button mat-icon-button class="add-btn sub-root" (click)="addNode(treeData)">
                    <mat-icon>add_circle</mat-icon>
                </button>
            </div>

            <div class="children-container level-1">
                <!-- CATEGORIES -->
                <div class="branch" *ngFor="let cat of treeData.children; let i = index">
                    <div class="connector-elbow"></div>
                    <div class="node category-node" [style.border-left-color]="cat.color">
                        <!-- Mode Lecture -->
                        <span *ngIf="editingNodeId !== cat.id" (click)="toggleEdit(cat)">{{ cat.name }}</span>
                        <!-- Mode Edition -->
                        <input *ngIf="editingNodeId === cat.id" [(ngModel)]="cat.name" (blur)="toggleEdit(cat)"
                            (keyup.enter)="toggleEdit(cat)" autoFocus>

                        <div class="node-actions">
                            <button mat-icon-button color="primary" (click)="addNode(cat)"
                                matTooltip="Ajouter une fonction">
                                <mat-icon>add</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteNode(treeData, i)"
                                matTooltip="Supprimer le lot">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </div>
                    </div>

                    <!-- FUNCTIONS -->
                    <div class="children-container level-2" *ngIf="cat.children && cat.children.length > 0">
                        <div class="leaf" *ngFor="let func of cat.children; let j = index">
                            <div class="connector-straight"></div>
                            <div class="node function-node" [class.implemented]="func.isImplemented"
                                [style.background-color]="func.isImplemented ? cat.color + '20' : '#fff'"
                                [style.border-left-color]="cat.color">

                                <div class="status-indicator" (click)="toggleImplementation(func)"
                                    [matTooltip]="func.isImplemented ? 'Inclus' : 'A faire'">
                                    <mat-icon *ngIf="func.isImplemented">check_circle</mat-icon>
                                    <mat-icon *ngIf="!func.isImplemented">radio_button_unchecked</mat-icon>
                                </div>

                                <div class="node-content">
                                    <span *ngIf="editingNodeId !== func.id" (click)="toggleEdit(func)">{{ func.name
                                        }}</span>
                                    <input *ngIf="editingNodeId === func.id" [(ngModel)]="func.name"
                                        (keyup.enter)="toggleEdit(func)" autoFocus>

                                    <!-- INFO BUBBLE -->
                                    <div class="info-bubble" *ngIf="func.description">
                                        <mat-icon class="info-icon" [matTooltip]="func.description">info</mat-icon>
                                    </div>
                                    <button class="add-note-btn" *ngIf="!func.description && editingNodeId !== func.id"
                                        (click)="func.description = 'Double-cliquez pour éditer...'">
                                        <mat-icon>add_comment</mat-icon>
                                    </button>

                                    <!-- EDIT DESCRIPTION MODE -->
                                    <div class="description-edit" *ngIf="editingNodeId === func.id">
                                        <label>Note Interne :</label>
                                        <textarea [(ngModel)]="func.description" rows="3"
                                            placeholder="Comment c'est géré dans FleetTrack ?"></textarea>
                                        <button mat-button color="primary" (click)="toggleEdit(func)">OK</button>
                                    </div>
                                </div>

                                <button class="delete-mini" (click)="deleteNode(cat, j)">×</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
