<div class="wf-container">
  
  <div class="wf-sidebar">
    <div class="wf-sidebar-header">
      <mat-icon>account_tree</mat-icon>
      <h2>Workflows</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item *ngFor="let wf of workflows" 
         [class.active]="selectedWorkflow?.id === wf.id"
         (click)="selectWorkflow(wf)">
        <mat-icon matListItemIcon>linear_scale</mat-icon>
        <div matListItemTitle>{{ wf.name }}</div>
      </a>
    </mat-nav-list>
  </div>

  <div class="wf-main" *ngIf="selectedWorkflow">
    <div class="wf-header">
      <h1>{{ selectedWorkflow.name }}</h1>
      <p>{{ selectedWorkflow.description }}</p>
    </div>

    <!-- Visual Graph -->
    <div class="wf-graph">
      <ng-container *ngFor="let step of selectedWorkflow.steps; let i = index">
        
        <!-- The Node -->
        <div class="wf-node" [class.disabled]="!step.enabled">
          <div class="wf-node-header">
            <div class="wf-node-icon"><mat-icon>{{ step.icon }}</mat-icon></div>
            <div class="wf-node-title">{{ step.title }}</div>
            <div class="wf-node-toggle" *ngIf="step.canDisable">
              <mat-slide-toggle color="primary" [(ngModel)]="step.enabled" matTooltip="Activer / Désactiver cette étape"></mat-slide-toggle>
            </div>
          </div>
          
          <div class="wf-node-body">
            <div class="wf-actor">
              <mat-icon>person</mat-icon>
              <span>{{ step.actor }}</span>
            </div>
            <p class="wf-desc">{{ step.description }}</p>
          </div>

          <div class="wf-node-footer" *ngIf="step.notifications.length > 0">
            <mat-icon>notifications</mat-icon>
            <div class="notif-badges">
              <span class="badge" *ngFor="let notif of step.notifications">{{ notif }}</span>
            </div>
          </div>
        </div>

        <!-- The Arrow -->
        <div class="wf-arrow" *ngIf="i < selectedWorkflow.steps.length - 1">
          <mat-icon>arrow_downward</mat-icon>
        </div>

      </ng-container>
    </div>

  </div>
</div>
