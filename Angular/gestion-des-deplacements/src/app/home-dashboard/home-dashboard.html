<div class="home-wrapper">
  <!-- News Banner -->
  <div class="news-banner" *ngIf="newsBanner">
    <mat-icon>campaign</mat-icon>
    <span>{{ newsBanner }}</span>
  </div>

  <!-- Top Hero Banner like Link -->
  <div class="hero-banner-container">
    <div class="hero-banner-content">
      <div class="hero-logo-section">
        <img [src]="brandSettings?.logoDark || 'assets/logo_acf.png'" alt="Logo" class="hero-logo-img">
        <h2 *ngIf="!brandSettings?.logoDark" class="hero-app-name">{{ brandSettings?.appName || 'FleetTrack' }}</h2>
      </div>
      
      <div class="hero-welcome-card">
        <h2>Bienvenue sur {{ brandSettings?.appName || 'FleetTrack' }}, {{ userName }} !</h2>
        <p>Ceci est votre <strong>tableau de bord</strong> personnel. Vous y trouverez toutes les données importantes en un clin d'œil.</p>
      </div>
    </div>
  </div>

  <div class="dashboard-container">
    <div class="section-header">
      <div class="icon-circle">
        <mat-icon>list</mat-icon>
      </div>
      <h2>Actions Rapides</h2>
    </div>

    <mat-card class="full-width-card">
      <mat-card-content class="actions-row">
        <button mat-flat-button color="primary" routerLink="/demande-mouvement" class="action-btn">
          <mat-icon>add_circle</mat-icon> Nouveau Mouvement
        </button>
        <button mat-stroked-button color="primary" routerLink="/planning" class="action-btn">
          <mat-icon>calendar_month</mat-icon> Mon Planning
        </button>
        <button mat-stroked-button color="primary" routerLink="/map" class="action-btn">
          <mat-icon>map</mat-icon> Carte Interactive
        </button>
      </mat-card-content>
    </mat-card>
  </div>
</div>
