<div class="waiver-container">
    <div class="waiver-header">
        <h1>{{ 'WAIVER.TITLE' | translate }}</h1>
        <p>{{ 'WAIVER.SUBTITLE' | translate }}</p>
    </div>

    <div class="legal-text-box">
        <h3>{{ 'WAIVER.LEGAL.ORG' | translate }}</h3>
        <p><strong>{{ 'WAIVER.LEGAL.CONDITIONS' | translate }}</strong></p>
        <p>
            {{ 'WAIVER.LEGAL.TEXT_1' | translate }}
        </p>
        <p>
            {{ 'WAIVER.LEGAL.TEXT_2' | translate }}
        </p>
    </div>

    <div class="form-section">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'WAIVER.FORM.NAME' | translate }}</mat-label>
            <input matInput [(ngModel)]="visitorName" placeholder="Ex: Jean Dupont">
            <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <label class="signature-label">{{ 'WAIVER.FORM.SIGNATURE' | translate }}</label>
        <div class="canvas-wrapper">
            <canvas #canvas></canvas>
        </div>
        <button mat-button color="warn" (click)="clearSignature()" class="clear-btn">
            {{ 'WAIVER.FORM.CLEAR' | translate }}
        </button>
    </div>

    <div class="actions">
        <button mat-stroked-button color="basic" routerLink="/dashboard">{{ 'WAIVER_PAGE.BACK_MENU' | translate
            }}</button>
        <button mat-flat-button color="primary" (click)="submitWaiver()">
            <mat-icon>check</mat-icon>
            {{ 'WAIVER.ACTIONS.VALIDATE' | translate }}
        </button>
    </div>
</div>
