<div class="personal-info-container">
  <div class="header-section">
    <div class="title-wrap">
      <h3>{{ 'PROFILE.PERSONAL_INFO' | translate }}</h3>
      <p>{{ 'PROFILE.DETAILS_DESC' | translate }}</p>
    </div>
    <span class="badge">{{ userProfileLabel | uppercase }}</span>
  </div>

  <form [formGroup]="personalInfoForm" (ngSubmit)="onSubmit()" class="form-layout">
    <div class="left-col">
      <div class="avatar-wrapper">
        <img src="assets/images/default-avatar.png" alt="Avatar" class="avatar-img" onerror="this.src='https://via.placeholder.com/150'">
      </div>
      <button type="button" class="btn-upload">{{ 'PROFILE.CHANGE_PHOTO' | translate }}</button>
      <p class="upload-note">{{ 'PROFILE.MAX_SIZE' | translate }}</p>
    </div>

    <div class="right-col">
      <div class="form-group">
        <label>{{ 'PROFILE.FULL_NAME' | translate }}</label>
        <input type="text" formControlName="fullName">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email">
      </div>

      <div class="form-group">
        <label>Numéro Mobile</label>
        <input type="tel" formControlName="mobileNo" placeholder="Ex. +33612345678">
      </div>

      <div class="form-group">
        <label>Langue</label>
        <select formControlName="language">
          <option value="Français">Français</option>
          <option value="English">English</option>
          <option value="Español">Español</option>
        </select>
      </div>

      <div class="form-group row-group">
        <label>Disponible</label>
        <div class="radio-group">
          <label><input type="radio" formControlName="available" value="yes"> Oui</label>
          <label><input type="radio" formControlName="available" value="no"> Non</label>
        </div>
      </div>

      <div class="readonly-grid" style="margin-top: 20px;">
        <div class="form-group">
          <label>Bureau Pays</label>
          <input type="text" formControlName="bureauPays">
        </div>
        <div class="form-group">
          <label>Base</label>
          <input type="text" formControlName="base">
        </div>
      </div>

      <div style="margin-top: 30px; text-align: right;">
        <button type="submit" class="btn-save" [disabled]="!personalInfoForm.valid">Enregistrer</button>
      </div>
    </div>
  </form>
</div>
