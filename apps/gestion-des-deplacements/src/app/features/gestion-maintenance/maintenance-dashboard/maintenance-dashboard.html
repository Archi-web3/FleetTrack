<div class="maintenance-container" style="padding: 20px;">

    <mat-tab-group animationDuration="0ms">
        <!-- TAB 1: SUIVI GLOBAL (Dashboard) -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon" style="margin-right: 8px;">dashboard</mat-icon>
                {{ 'MAINTENANCE.TABS.GLOBAL' | translate }}
            </ng-template>
            <div class="tab-content" style="padding-top: 20px;">
                <app-maintenance-tracking></app-maintenance-tracking>
            </div>
        </mat-tab>

        <!-- TAB 2: SUIVI HEBDO -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon" style="margin-right: 8px;">playlist_add_check</mat-icon>
                {{ 'MAINTENANCE.TABS.WEEKLY' | translate }}
            </ng-template>
            <div class="tab-content" style="padding-top: 20px;">
                <!-- ENCART D'EXPLICATION (VERT) -->
                <div style="background-color: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; border-left: 5px solid #4caf50; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px;">
                    <mat-icon style="color: #4caf50;">info</mat-icon>
                    <div>
                        <h4 style="margin: 0 0 5px 0; font-weight: bold;">{{ 'WEEKLY_CHECKLIST.HOW_IT_WORKS' | translate }}</h4>
                        <p style="margin: 0; font-size: 0.95rem;">
                            {{ 'WEEKLY_CHECKLIST.DESCRIPTION' | translate }}
                        </p>
                    </div>
                </div>

                <app-weekly-checklist-tracker></app-weekly-checklist-tracker>
            </div>
        </mat-tab>

    </mat-tab-group>

</div>
